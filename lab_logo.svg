<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <!-- Burgundy gradient -->
    <linearGradient id="burgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#733237;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B3A3F;stop-opacity:1" />
    </linearGradient>
    <!-- Teal accent gradient -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9B76;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B88F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Abstract brain + network nodes (AI + Health) -->
  <g transform="translate(30, 20)">
    <!-- Outer circle -->
    <circle cx="80" cy="80" r="75" fill="none" stroke="#733237" stroke-width="3" opacity="0.2"/>

    <!-- Inner hexagonal network (AI nodes) -->
    <!-- Center node -->
    <circle cx="80" cy="80" r="8" fill="url(#burgGrad)"/>

    <!-- Surrounding nodes -->
    <circle cx="80" cy="40" r="6" fill="url(#tealGrad)"/>
    <circle cx="115" cy="60" r="6" fill="#733237"/>
    <circle cx="115" cy="100" r="6" fill="url(#tealGrad)"/>
    <circle cx="80" cy="120" r="6" fill="#733237"/>
    <circle cx="45" cy="100" r="6" fill="url(#tealGrad)"/>
    <circle cx="45" cy="60" r="6" fill="#733237"/>

    <!-- Outer ring nodes -->
    <circle cx="80" cy="12" r="4" fill="#733237" opacity="0.5"/>
    <circle cx="140" cy="45" r="4" fill="#0D9B76" opacity="0.5"/>
    <circle cx="140" cy="115" r="4" fill="#733237" opacity="0.5"/>
    <circle cx="80" cy="148" r="4" fill="#0D9B76" opacity="0.5"/>
    <circle cx="20" cy="115" r="4" fill="#733237" opacity="0.5"/>
    <circle cx="20" cy="45" r="4" fill="#0D9B76" opacity="0.5"/>

    <!-- Connection lines -->
    <line x1="80" y1="72" x2="80" y2="46" stroke="#733237" stroke-width="1.5" opacity="0.4"/>
    <line x1="87" y1="75" x2="109" y2="63" stroke="#733237" stroke-width="1.5" opacity="0.4"/>
    <line x1="87" y1="85" x2="109" y2="97" stroke="#733237" stroke-width="1.5" opacity="0.4"/>
    <line x1="80" y1="88" x2="80" y2="114" stroke="#733237" stroke-width="1.5" opacity="0.4"/>
    <line x1="73" y1="85" x2="51" y2="97" stroke="#733237" stroke-width="1.5" opacity="0.4"/>
    <line x1="73" y1="75" x2="51" y2="63" stroke="#733237" stroke-width="1.5" opacity="0.4"/>

    <!-- Outer connections -->
    <line x1="80" y1="34" x2="80" y2="16" stroke="#0D9B76" stroke-width="1" opacity="0.3"/>
    <line x1="120" y1="57" x2="136" y2="48" stroke="#0D9B76" stroke-width="1" opacity="0.3"/>
    <line x1="120" y1="103" x2="136" y2="112" stroke="#0D9B76" stroke-width="1" opacity="0.3"/>
    <line x1="80" y1="126" x2="80" y2="144" stroke="#0D9B76" stroke-width="1" opacity="0.3"/>
    <line x1="40" y1="103" x2="24" y2="112" stroke="#0D9B76" stroke-width="1" opacity="0.3"/>
    <line x1="40" y1="57" x2="24" y2="48" stroke="#0D9B76" stroke-width="1" opacity="0.3"/>

    <!-- Health cross in center -->
    <rect x="76" y="73" width="8" height="14" rx="1" fill="white"/>
    <rect x="73" y="76" width="14" height="8" rx="1" fill="white"/>
  </g>

  <!-- Text: Lab Name -->
  <g transform="translate(195, 35)">
    <!-- 620 badge -->
    <rect x="0" y="0" width="48" height="24" rx="4" fill="url(#burgGrad)"/>
    <text x="24" y="17" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">620</text>

    <!-- Lab name line 1 -->
    <text x="58" y="18" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#733237" letter-spacing="0.5">
      Health Economics &amp; Artificial Intelligence Lab
    </text>

    <!-- Divider -->
    <line x1="0" y1="34" x2="380" y2="34" stroke="#0D9B76" stroke-width="2" opacity="0.6"/>

    <!-- Chinese name -->
    <text x="0" y="56" font-family="Arial, sans-serif" font-size="13" fill="#555" letter-spacing="1">
      健康經濟與人工智慧實驗室
    </text>

    <!-- NTU affiliation -->
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="11" fill="#888" letter-spacing="0.5">
      National Taiwan University · Institute of Health Policy and Management
    </text>

    <!-- Chinese affiliation -->
    <text x="0" y="98" font-family="Arial, sans-serif" font-size="11" fill="#888" letter-spacing="0.5">
      國立臺灣大學 · 健康政策與管理研究所
    </text>
  </g>
</svg>
